<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مملكة التداول — رصد KSA</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#fff;display:flex;flex-direction:column}
.header{background:#0d0d0d;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #1e1e1e;flex-shrink:0}
.logo{font-size:18px;font-weight:700}.logo span{color:#FFA500}
.badge{background:#111;border:0.5px solid #222;border-radius:6px;padding:5px 12px;font-size:12px;color:#666}
.badge b{color:#00CC44}
.dot{width:7px;height:7px;border-radius:50%;background:#00CC44;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;gap:4px;padding:8px 16px;background:#0d0d0d;border-bottom:0.5px solid #1e1e1e;overflow-x:auto;flex-shrink:0}
.tabs::-webkit-scrollbar{height:2px}.tabs::-webkit-scrollbar-thumb{background:#222}
.tab{padding:6px 14px;border-radius:7px;font-size:13px;color:#555;border:0.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500}
.tab:hover{color:#aaa}.tab.active{background:#1a1a1a;color:#fff;border-color:#2a2a2a}
.layout{display:flex;flex:1;overflow:hidden}
.chart-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chart-top{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #1a1a1a;background:#0d0d0d;flex-shrink:0}
.ct-left{display:flex;align-items:baseline;gap:12px}
.ticker-label{font-size:14px;color:#555;font-weight:600}
.price-main{font-size:26px;font-weight:700;color:#fff}
.price-chg{font-size:13px}
.chg-up{color:#00CC44}.chg-dn{color:#FF4444}
.tf-row{display:flex;gap:4px}
.tf{font-size:12px;padding:4px 10px;border-radius:5px;color:#555;border:0.5px solid #222;cursor:pointer;transition:all .15s}
.tf.active,.tf:hover{color:#fff;border-color:#444;background:#1a1a1a}
#chart-container{flex:1;position:relative}
.sidebar{width:260px;border-right:0.5px solid #1e1e1e;background:#0d0d0d;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-section{padding:12px 14px 8px;border-bottom:0.5px solid #141414}
.sb-title{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.lv-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#111;border-radius:8px;margin-bottom:4px;border-right:2px solid transparent}
.lv-cw{border-right-color:#FF4444}.lv-pw{border-right-color:#00CC44}.lv-zg{border-right-color:#555}.lv-hvl{border-right-color:#4da6ff}
.lv-label{font-size:12px;color:#666}.lv-val{font-size:14px;font-weight:600}
.vc-cw{color:#FF4444}.vc-pw{color:#00CC44}.vc-zg{color:#aaa}.vc-hvl{color:#4da6ff}
.gex-pills{display:flex;flex-wrap:wrap;gap:4px}
.gp{font-size:11px;padding:3px 8px;border-radius:5px;font-weight:600}
.g-red{background:#1a0d0d;color:#FF4444;border:0.5px solid #3a1a1a}
.g-pur{background:#13111f;color:#9B59B6;border:0.5px solid #2a1f4a}
.g-grn{background:#0d1a0d;color:#00CC44;border:0.5px solid #1a3a1a}
.contract{background:#111;border-radius:8px;padding:8px 10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;border-right:2px solid #FF4444}
.contract.call{border-right-color:#00CC44}
.ct-type{font-size:10px;font-weight:700;color:#FF4444}
.contract.call .ct-type{color:#00CC44}
.ct-strike{font-size:15px;font-weight:700;color:#fff}
.ct-info{font-size:10px;color:#555;text-align:left}
.stat-box{background:#111;border-radius:8px;overflow:hidden}
.stat-row{display:flex;justify-content:space-between;padding:7px 10px;border-bottom:0.5px solid #1a1a1a}
.stat-row:last-child{border-bottom:none}
.sl{font-size:11px;color:#555}.sv{font-size:11px;font-weight:600}
.overview-panel{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.ov-card{background:#111;border:0.5px solid #1e1e1e;border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
.ov-card:hover{border-color:#333}.ov-card.sel{border-color:#4da6ff}
.ov-top{display:flex;justify-content:space-between;margin-bottom:6px}
.ov-ticker{font-size:15px;font-weight:700}.ov-price{font-size:12px;color:#555}
.ov-lrow{display:flex;justify-content:space-between;margin:2px 0}
.ov-ll{font-size:10px;color:#444}.ov-lv{font-size:10px;font-weight:600}
.ov-bar{height:3px;background:#1a1a1a;border-radius:2px;position:relative;margin:5px 0}
.ov-spot{position:absolute;top:-3px;width:3px;height:9px;background:#4da6ff;border-radius:1px}
.ov-footer{display:flex;justify-content:space-between;margin-top:6px}
.ov-badge{font-size:10px;padding:2px 7px;border-radius:4px}
.ob-bull{background:#0d1f0d;color:#00CC44;border:0.5px solid #1a3a1a}
.ob-bear{background:#1f0d0d;color:#FF4444;border:0.5px solid #3a1a1a}
.ov-pc{font-size:10px;color:#444}
.loading{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;flex:1;color:#333;font-size:13px}
.spinner{width:28px;height:28px;border:2px solid #1a1a1a;border-top-color:#FFA500;border-radius:50%;animation:spin .8s linear infinite}
/* ── المؤشرات ── */
.ind-section{padding:12px 14px 10px;border-bottom:0.5px solid #141414}
.ind-title{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.gp-bar-wrap{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.gp-label{font-size:10px;color:#666;width:36px;text-align:right;flex-shrink:0}
.gp-track{flex:1;height:9px;background:#111;border-radius:2px;position:relative;overflow:visible}
.gp-fill{height:100%;border-radius:2px;min-width:2px}
.gp-val{font-size:9px;color:#444;width:30px;text-align:left;flex-shrink:0}
.gp-spot{position:absolute;top:-3px;width:2px;height:15px;background:#4da6ff;border-radius:1px;z-index:2}
.pressure-bar{height:10px;background:#1a1a1a;border-radius:5px;overflow:hidden;margin:7px 0;position:relative}
.pressure-call{height:100%;float:left;background:#00CC44;transition:width .4s}
.pressure-put{height:100%;float:right;background:#FF4444;transition:width .4s}
.pressure-lbl{display:flex;justify-content:space-between;font-size:10px;margin-top:4px}
.delta-bar{height:8px;background:#1a1a1a;border-radius:4px;position:relative;margin:7px 0}
.delta-fill{height:100%;border-radius:4px;position:absolute;transition:all .4s}
.delta-center{position:absolute;left:50%;top:-2px;width:1px;height:12px;background:#333}
.pc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.pc-big{font-size:20px;font-weight:700}
.pc-tag{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600}
.pc-bull{background:#0d1f0d;color:#00CC44;border:0.5px solid #1a3a1a}
.pc-bear{background:#1f0d0d;color:#FF4444;border:0.5px solid #3a1a1a}
.pc-neu{background:#1a120d;color:#FFA500;border:0.5px solid #3a2a1a}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">مملكة <span>التداول</span> — رصد KSA</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="badge" id="update-badge">جاري التحميل...</div>
    <span class="dot"></span>
  </div>
</div>
<div class="tabs" id="tabs-bar">
  <div class="tab active" onclick="showView('overview')">الكل</div>
  <div class="tab" onclick="showView('chart')">الشارت</div>
</div>
<div id="view-overview" class="overview-panel">
  <div class="loading"><div class="spinner"></div>جاري سحب البيانات...</div>
</div>
<div id="view-chart" class="layout" style="display:none">
  <div class="sidebar" id="sidebar"></div>
  <div class="chart-panel">
    <div class="chart-top">
      <div class="ct-left">
        <span class="ticker-label" id="chart-name">—</span>
        <span class="price-main" id="chart-price">—</span>
        <span class="price-chg" id="chart-chg"></span>
      </div>
      <div class="tf-row">
        <span class="tf" onclick="setTF(this,'1')">1د</span>
        <span class="tf active" onclick="setTF(this,'5')">5د</span>
        <span class="tf" onclick="setTF(this,'15')">15د</span>
        <span class="tf" onclick="setTF(this,'60')">1س</span>
        <span class="tf" onclick="setTF(this,'D')">يوم</span>
      </div>
    </div>
    <div id="chart-container"></div>
  </div>
</div>

<script>
const POLY_KEY  = 'V7kP4H3wW_PDpOBge7jQ80G3JjUDUP0W';
const SHEET_ID  = '1kS31BVYSn_xEPCtsOOeebMZuOyDS3OpQaE1Sv8ZR1wU';
const CSV_URL  = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=0');

let allData = [], selectedTicker = null, currentView = 'overview', currentTF = '5';
let chart = null, candleSeries = null, chartLoaded = false;

// ── Polygon ticker map ──
const POLY_MAP = {
  SPX:'I:SPX', SPY:'SPY', QQQ:'QQQ', IWM:'IWM', GLD:'GLD', TLT:'TLT',
  AAPL:'AAPL', MSFT:'MSFT', NVDA:'NVDA', AMZN:'AMZN', GOOGL:'GOOGL',
  META:'META', TSLA:'TSLA', NFLX:'NFLX', AMD:'AMD', AVGO:'AVGO',
  JPM:'JPM', BAC:'BAC', GS:'GS', V:'V', MA:'MA', UNH:'UNH', LLY:'LLY', XOM:'XOM'
};

// ── CSV Parser ──
function parseCSV(text) {
  const rows = [];
  for (const line of text.trim().split('\n')) {
    const cols = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

// ── جلب Sheets ──
async function fetchSheets() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);
    allData = rows.slice(1).filter(r => r[0] && r[0] !== 'Ticker' && parseFloat(r[1]) > 0).map(r => {
      const g = i => parseFloat((r[i]||'0').replace(/[^0-9.\-]/g,'')) || 0;
      const s = i => (r[i]||'—').replace(/"/g,'').trim();
      return {
        ticker:s(0), spot:g(1), callWall:g(2), putWall:g(3), zeroGamma:g(4), topGamma:g(5),
        dCall:g(6), dPut:g(7), theta:g(8), vega:g(9), oiCall:g(10), oiPut:g(11), pcRatio:g(12),
        c1:s(13), c2:s(14), c3:s(15),
        gl1:g(16),gl2:g(17),gl3:g(18),gl4:g(19),gl5:g(20),gl6:g(21),gl7:g(22),
        intradayRaw:s(23),
        updatedAt:s(24)
      };
    });
    const last = allData[allData.length-1]?.updatedAt || '—';
    document.getElementById('update-badge').innerHTML = 'آخر تحديث: <b>' + last.slice(11,16) + '</b>';
    buildTabs();
    if (currentView === 'overview') renderOverview();
    else if (selectedTicker && !chartLoaded) loadChart(selectedTicker);
    else if (selectedTicker) renderSidebar(selectedTicker);
  } catch(e) {
    document.getElementById('update-badge').textContent = 'خطأ في التحميل';
  }
}

// ── Tabs ──
function buildTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '<div class="tab '+(currentView==='overview'?'active':'')+'" onclick="showView(\'overview\')">الكل</div><div class="tab '+(currentView==='chart'?'active':'')+'" onclick="showView(\'chart\')">الشارت</div><div style="width:1px;background:#1a1a1a;margin:0 4px;flex-shrink:0"></div>';
  allData.forEach(d => {
    const div = document.createElement('div');
    div.className = 'tab '+(selectedTicker===d.ticker?'active':'');
    div.textContent = d.ticker;
    div.onclick = () => selectTicker(d.ticker);
    bar.appendChild(div);
  });
}

// ── Overview ──
function renderOverview() {
  const panel = document.getElementById('view-overview');
  if (!allData.length) return;
  panel.innerHTML = '<div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">'+allData.length+' رمز</div><div class="ov-grid" id="ov-grid"></div>';
  const grid = document.getElementById('ov-grid');
  allData.forEach(d => {
    const range = d.callWall - d.putWall;
    const pct = range > 0 ? Math.max(2,Math.min(97,((d.spot-d.putWall)/range)*100)) : 50;
    const bull = d.spot >= d.zeroGamma;
    const card = document.createElement('div');
    card.className = 'ov-card '+(selectedTicker===d.ticker?'sel':'');
    card.onclick = () => selectTicker(d.ticker);
    card.innerHTML =
      '<div class="ov-top"><span class="ov-ticker">'+d.ticker+'</span><span class="ov-price">'+d.spot.toLocaleString()+'</span></div>'+
      '<div class="ov-lrow"><span class="ov-ll">Call Wall</span><span class="ov-lv vc-cw">'+d.callWall+'</span></div>'+
      '<div class="ov-bar"><div class="ov-spot" style="left:'+pct.toFixed(1)+'%"></div></div>'+
      '<div class="ov-lrow"><span class="ov-ll">Zero Gamma</span><span class="ov-lv vc-zg">'+d.zeroGamma+'</span></div>'+
      '<div class="ov-lrow"><span class="ov-ll">Put Wall</span><span class="ov-lv vc-pw">'+d.putWall+'</span></div>'+
      '<div class="ov-footer"><span class="ov-badge '+(bull?'ob-bull':'ob-bear')+'">'+(bull?'إيجابي':'سلبي')+'</span><span class="ov-pc">P/C '+d.pcRatio+'</span></div>';
    grid.appendChild(card);
  });
}

// ── Sidebar ──
function buildGammaProfile(d) {
  if (!d.intradayRaw || d.intradayRaw === '—' || d.intradayRaw.length < 5) return '';
  const pairs = d.intradayRaw.split(',').map(p => {
    const s = p.split(':'); return {strike: parseFloat(s[0]), gex: parseFloat(s[1])};
  }).filter(p => p.strike && !isNaN(p.gex));
  if (!pairs.length) return '';
  const maxAbs = Math.max(...pairs.map(p => Math.abs(p.gex)));
  if (!maxAbs) return '';
  // فقط المستويات ذات الأهمية (أعلى 12 بالقيمة المطلقة)
  const top = [...pairs].sort((a,b) => Math.abs(b.gex)-Math.abs(a.gex)).slice(0,12)
    .sort((a,b) => b.strike - a.strike);
  let html = '<div class="ind-section"><div class="ind-title">Gamma Profile</div>';
  top.forEach(p => {
    const pct = Math.min(100, (Math.abs(p.gex)/maxAbs)*100);
    const col = p.gex >= 0 ? '#00CC44' : '#FF4444';
    const val = p.gex >= 0 ? '+'+Math.round(p.gex/1000)+'K' : Math.round(p.gex/1000)+'K';
    const spotPct = d.spot > 0 ? Math.max(0,Math.min(100,((d.spot-p.strike)/(maxAbs*0.001+1))*50+50)) : -1;
    html += '<div class="gp-bar-wrap">'+
      '<span class="gp-label">'+p.strike+'</span>'+
      '<div class="gp-track">'+
        '<div class="gp-fill" style="width:'+pct.toFixed(1)+'%;background:'+col+'"></div>'+
        (Math.abs(p.strike - d.spot) < (d.callWall - d.putWall)*0.03 ?
          '<div class="gp-spot" style="left:'+pct.toFixed(1)+'%"></div>' : '')+
      '</div>'+
      '<span class="gp-val" style="color:'+col+'">'+val+'</span>'+
    '</div>';
  });
  return html + '</div>';
}

function buildPressure(d) {
  if (!d.intradayRaw || d.intradayRaw === '—' || d.intradayRaw.length < 5) return '';
  const pairs = d.intradayRaw.split(',').map(p => {
    const s = p.split(':'); return parseFloat(s[1]);
  }).filter(v => !isNaN(v));
  const callSum = pairs.filter(v=>v>0).reduce((a,b)=>a+b,0);
  const putSum  = Math.abs(pairs.filter(v=>v<0).reduce((a,b)=>a+b,0));
  const total   = callSum + putSum;
  if (!total) return '';
  const callPct = Math.round((callSum/total)*100);
  const putPct  = 100 - callPct;
  const bull = callPct > putPct;
  return '<div class="ind-section"><div class="ind-title">0DTE Pressure</div>'+
    '<div class="stat-box" style="padding:10px">'+
    '<div class="pressure-bar" style="overflow:hidden;display:flex">'+
      '<div class="pressure-call" style="width:'+callPct+'%;height:100%;background:#00CC44"></div>'+
      '<div style="flex:1;background:#FF4444"></div>'+
    '</div>'+
    '<div class="pressure-lbl">'+
      '<span style="color:#00CC44">Call '+callPct+'%</span>'+
      '<span style="color:'+(bull?'#00CC44':'#FF4444')+'">'+
        (bull ? '🟢 ضغط شراء' : '🔴 ضغط بيع')+'</span>'+
      '<span style="color:#FF4444">Put '+putPct+'%</span>'+
    '</div></div></div>';
}

function buildDeltaNet(d) {
  const net = d.dCall + d.dPut;
  const maxVal = Math.max(Math.abs(d.dCall), Math.abs(d.dPut), 0.01);
  const pct = Math.min(100, (Math.abs(net)/maxVal)*50);
  const col  = net >= 0 ? '#00CC44' : '#FF4444';
  const dir  = net >= 0 ? 'right' : 'left';
  return '<div class="ind-section"><div class="ind-title">Delta Net Exposure</div>'+
    '<div class="stat-box" style="padding:10px">'+
    '<div class="delta-bar">'+
      '<div class="delta-center"></div>'+
      '<div class="delta-fill" style="width:'+pct+'%;'+dir+':50%;background:'+col+'"></div>'+
    '</div>'+
    '<div class="pressure-lbl">'+
      '<span style="color:#00CC44">Call '+d.dCall+'M$</span>'+
      '<span style="color:'+col+';font-weight:600">Net '+(net>=0?'+':'')+net.toFixed(1)+'M$</span>'+
      '<span style="color:#FF4444">Put '+d.dPut+'M$</span>'+
    '</div></div></div>';
}

function buildPCRatio(d) {
  const pc = d.pcRatio;
  let tag, cls, hint;
  if      (pc >= 1.2) { tag='تحوط مرتفع'; cls='pc-bear'; hint='إشارة عكسية صعودية محتملة'; }
  else if (pc <= 0.7) { tag='مضاربة مفرطة'; cls='pc-bull'; hint='تحذير — استنزاف الشراء'; }
  else                 { tag='متوازن'; cls='pc-neu'; hint='السوق في حالة طبيعية'; }
  return '<div class="ind-section"><div class="ind-title">Put / Call Ratio</div>'+
    '<div class="stat-box" style="padding:10px">'+
    '<div class="pc-row">'+
      '<span class="pc-big" style="color:'+(pc>=1.2?'#FF4444':pc<=0.7?'#00CC44':'#FFA500')+'">'+pc+'</span>'+
      '<div style="text-align:right">'+
        '<div><span class="pc-tag '+cls+'">'+tag+'</span></div>'+
        '<div style="font-size:10px;color:#444;margin-top:4px">'+hint+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="height:6px;background:#1a1a1a;border-radius:3px;margin-top:8px;overflow:hidden">'+
      '<div style="height:100%;width:'+Math.min(100,pc/2*100)+'%;background:'+(pc>=1.2?'#FF4444':pc<=0.7?'#00CC44':'#FFA500')+';border-radius:3px;transition:width .4s"></div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:9px;color:#333;margin-top:3px">'+
      '<span>0.7 شراء</span><span>1.0</span><span>1.2 تحوط</span>'+
    '</div></div></div>';
}

function renderSidebar(ticker) {
  const d = allData.find(x => x.ticker===ticker);
  if (!d) return;
  const gexs = [d.gl1,d.gl2,d.gl3,d.gl4,d.gl5,d.gl6,d.gl7].filter(g=>g>0);
  const pills = gexs.map(g=>'<span class="gp '+(g>d.callWall?'g-grn':g>=d.zeroGamma?'g-pur':'g-red')+'">'+g+'</span>').join('');
  const cHTML = str => {
    if(!str||str==='—'||str==='') return '';
    const parts=str.split(' '), strike=parts[0]||'', type=parts[1]||'', exp=parts[2]||'';
    const pi=str.indexOf('|'), oi=pi>=0?str.slice(pi+1).trim():'';
    return '<div class="contract '+(type==='CALL'?'call':'')+'"><div><div class="ct-type">'+type+'</div><div class="ct-strike">'+strike+'</div></div><div class="ct-info">'+exp+'<br>'+oi+'</div></div>';
  };
  document.getElementById('sidebar').innerHTML =
    '<div class="sb-section"><div class="sb-title">'+ticker+' — المستويات</div>'+
    '<div class="lv-item lv-cw"><span class="lv-label">مقاومة الكول</span><span class="lv-val vc-cw">'+d.callWall+'</span></div>'+
    '<div class="lv-item lv-hvl"><span class="lv-label">الأعلى سيولة</span><span class="lv-val vc-hvl">'+d.topGamma+'</span></div>'+
    '<div class="lv-item lv-zg"><span class="lv-label">نقطة التحول</span><span class="lv-val vc-zg">'+d.zeroGamma+'</span></div>'+
    '<div class="lv-item lv-pw"><span class="lv-label">دعم البوت</span><span class="lv-val vc-pw">'+d.putWall+'</span></div></div>'+
    '<div class="sb-section"><div class="sb-title">GEX Levels</div><div class="gex-pills">'+pills+'</div></div>'+
    '<div class="sb-section"><div class="sb-title">أفضل العقود</div>'+cHTML(d.c1)+cHTML(d.c2)+cHTML(d.c3)+'</div>'+
    '<div class="sb-section"><div class="sb-title">الإحصائيات</div><div class="stat-box">'+
    '<div class="stat-row"><span class="sl">OI Call</span><span class="sv" style="color:#00CC44">'+Number(d.oiCall).toLocaleString()+'</span></div>'+
    '<div class="stat-row"><span class="sl">OI Put</span><span class="sv" style="color:#FF4444">'+Number(d.oiPut).toLocaleString()+'</span></div>'+
    '<div class="stat-row"><span class="sl">P/C Ratio</span><span class="sv">'+d.pcRatio+'</span></div>'+
    '<div class="stat-row"><span class="sl">Delta Call</span><span class="sv" style="color:#00CC44">'+d.dCall+'M$</span></div>'+
    '<div class="stat-row"><span class="sl">Delta Put</span><span class="sv" style="color:#FF4444">'+d.dPut+'M$</span></div>'+
    '<div class="stat-row"><span class="sl">Vega</span><span class="sv">'+d.vega+'M$</span></div>'+
    '</div></div>'+
    buildPressure(d)+
    buildDeltaNet(d)+
    buildPCRatio(d)+
    buildGammaProfile(d);
}

// ── Polygon شموع ──
async function fetchCandles(ticker, tf) {
  const sym = POLY_MAP[ticker] || ticker;
  const isIndex = sym.startsWith('I:');

  const now   = new Date();
  const from  = new Date(now);
  if (tf === 'D') from.setMonth(from.getMonth()-6);
  else if (tf === '60') from.setDate(from.getDate()-30);
  else if (tf === '15') from.setDate(from.getDate()-10);
  else from.setDate(from.getDate()-3);

  const fromStr = from.toISOString().slice(0,10);
  const toStr   = now.toISOString().slice(0,10);

  const mult   = tf === 'D' ? 1 : parseInt(tf);
  const span   = tf === 'D' ? 'day' : 'minute';
  const encSym = encodeURIComponent(sym);

  const url = `https://api.polygon.io/v2/aggs/ticker/${encSym}/range/${mult}/${span}/${fromStr}/${toStr}?adjusted=true&sort=asc&limit=5000&apiKey=${POLY_KEY}`;

  const res  = await fetch(url);
  const data = await res.json();
  if (!data.results || data.results.length === 0) return [];

  return data.results.map(b => ({
    time: tf === 'D' ? b.t/1000 : b.t/1000,
    open:  +b.o.toFixed(2),
    high:  +b.h.toFixed(2),
    low:   +b.l.toFixed(2),
    close: +b.c.toFixed(2),
  }));
}

// ── بناء الشارت ──
function initChart() {
  const container = document.getElementById('chart-container');
  if (chart) { chart.remove(); chart = null; candleSeries = null; }

  chart = LightweightCharts.createChart(container, {
    layout: { background:{color:'#0a0a0a'}, textColor:'#555' },
    grid:   { vertLines:{color:'#111'}, horzLines:{color:'#111'} },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor:'#1a1a1a' },
    timeScale: { borderColor:'#1a1a1a', timeVisible:true, secondsVisible:false, rightOffset:10 },
    width:  container.clientWidth,
    height: container.clientHeight,
  });

  candleSeries = chart.addCandlestickSeries({
    upColor:'#00CC44', downColor:'#FF4444',
    borderUpColor:'#00CC44', borderDownColor:'#FF4444',
    wickUpColor:'#00CC44', wickDownColor:'#FF4444',
  });

  window.addEventListener('resize', () => {
    if (chart) chart.applyOptions({width:container.clientWidth, height:container.clientHeight});
  });
}

// ── رسم المستويات على الشارت ──
function drawLevels(d) {
  if (!candleSeries) return;

  // المستويات الرئيسية دائماً
  const mainLines = [
    {price:d.callWall,  color:'#FF4444', width:2, style:0, title:'CW '+d.callWall},
    {price:d.putWall,   color:'#00CC44', width:2, style:0, title:'PW '+d.putWall},
    {price:d.zeroGamma, color:'#666666', width:1, style:1, title:'ZG '+d.zeroGamma},
    {price:d.topGamma,  color:'#4da6ff', width:1, style:0, title:'HVL '+d.topGamma},
  ];
  mainLines.forEach(l => {
    try { candleSeries.createPriceLine({price:l.price,color:l.color,lineWidth:l.width,lineStyle:l.style,axisLabelVisible:true,title:l.title}); } catch(e){}
  });

  // مستويات Intraday (0DTE) إذا متاحة
  if (d.intradayRaw && d.intradayRaw !== '—' && d.intradayRaw.length > 5) {
    const mainPrices = new Set([d.callWall, d.putWall, d.zeroGamma, d.topGamma]);
    d.intradayRaw.split(',').forEach(pair => {
      const parts  = pair.split(':');
      if (parts.length !== 2) return;
      const strike = parseFloat(parts[0]);
      const gex    = parseFloat(parts[1]);
      if (!strike || isNaN(gex)) return;
      if (mainPrices.has(strike)) return;
      const col = gex > 0 ? '#00AA33' : '#CC2222';
      const lbl = (gex > 0 ? '+' : '') + Math.round(gex/1000) + 'K';
      try { candleSeries.createPriceLine({price:strike,color:col,lineWidth:1,lineStyle:2,axisLabelVisible:true,title:lbl}); } catch(e){}
    });
  } else {
    // fallback: GL1-7
    const gexs = [d.gl1,d.gl2,d.gl3,d.gl4,d.gl5,d.gl6,d.gl7].filter(g=>g>0);
    gexs.forEach(g => {
      if(Math.abs(g-d.callWall)>0.5&&Math.abs(g-d.putWall)>0.5&&Math.abs(g-d.zeroGamma)>0.5)
        try{candleSeries.createPriceLine({price:g,color:'#FFA500',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:String(g)});}catch(e){}
    });
  }
}

// ── تحميل الشارت الكامل ──
async function loadChart(ticker) {
  const d = allData.find(x => x.ticker===ticker);
  if (!d) return;

  document.getElementById('chart-name').textContent  = ticker;
  document.getElementById('chart-price').textContent = d.spot.toLocaleString();
  document.getElementById('chart-chg').textContent   = '';
  renderSidebar(ticker);
  initChart();

  try {
    const candles = await fetchCandles(ticker, currentTF);
    if (candles.length === 0) {
      document.getElementById('chart-chg').innerHTML = '<span style="color:#666;font-size:11px">لا توجد بيانات — السوق مغلق أو الرمز غير متاح</span>';
      return;
    }
    candleSeries.setData(candles);
    drawLevels(d);
    chart.timeScale().fitContent();
    chartLoaded = true;

    // حساب التغيير
    const first = candles[0], last = candles[candles.length-1];
    const chg = last.close - first.open;
    const pct = ((chg/first.open)*100).toFixed(2);
    document.getElementById('chart-chg').innerHTML =
      '<span class="'+(chg>=0?'chg-up':'chg-dn')+'">'+(chg>=0?'+':'')+chg.toFixed(2)+' ('+pct+'%)</span>';

  } catch(e) {
    document.getElementById('chart-chg').innerHTML = '<span style="color:#FF4444;font-size:11px">خطأ: '+e.message+'</span>';
  }
}

function setTF(el, tf) {
  document.querySelectorAll('.tf').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  currentTF = tf;
  chartLoaded = false;
  if (selectedTicker) loadChart(selectedTicker);
}

function selectTicker(ticker) {
  selectedTicker = ticker;
  chartLoaded = false;
  buildTabs();
  showView('chart');
}

function showView(view) {
  currentView = view;
  document.getElementById('view-overview').style.display = view==='overview'?'flex':'none';
  document.getElementById('view-chart').style.display    = view==='chart'?'flex':'none';
  buildTabs();
  if (view==='overview') renderOverview();
  else { const t = selectedTicker||allData[0]?.ticker; if(t){selectedTicker=t;loadChart(t);} }
}

fetchSheets();
setInterval(fetchSheets, 5*60*1000);
</script>
