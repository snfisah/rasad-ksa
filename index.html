<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مملكة التداول — رصد KSA</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#fff;display:flex;flex-direction:column}
.header{background:#0d0d0d;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #1e1e1e;flex-shrink:0}
.logo{font-size:16px;font-weight:700}.logo span{color:#FFA500}
.badge{background:#111;border:0.5px solid #222;border-radius:6px;padding:4px 10px;font-size:11px;color:#666}
.badge b{color:#00CC44}
.dot{width:6px;height:6px;border-radius:50%;background:#00CC44;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-tabs{display:flex;gap:4px;padding:6px 12px;background:#0d0d0d;border-bottom:0.5px solid #1e1e1e;flex-shrink:0}
.nav-tab{padding:5px 14px;border-radius:6px;font-size:12px;color:#555;border:0.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500}
.nav-tab:hover{color:#aaa}.nav-tab.active{background:#1a1a1a;color:#fff;border-color:#2a2a2a}
.ticker-toolbar{display:flex;align-items:center;gap:0;background:#0d0d0d;border-bottom:0.5px solid #1e1e1e;flex-shrink:0;overflow:hidden}
.ticker-scroll{display:flex;gap:3px;padding:6px 10px;overflow-x:auto;flex:1;scroll-behavior:smooth}
.ticker-scroll::-webkit-scrollbar{height:2px}.ticker-scroll::-webkit-scrollbar-thumb{background:#222}
.t-chip{padding:4px 12px;border-radius:6px;font-size:12px;color:#555;border:0.5px solid #1a1a1a;cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500;flex-shrink:0}
.t-chip:hover{color:#aaa;border-color:#2a2a2a}
.t-chip.active{background:#1a1a1a;color:#fff;border-color:#FFA500}
.scroll-btn{width:28px;height:100%;background:#0d0d0d;border:none;color:#444;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:color .15s;padding:0 2px}
.scroll-btn:hover{color:#aaa}
.layout{display:flex;flex:1;overflow:hidden}
.chart-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chart-top{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #1a1a1a;background:#0d0d0d;flex-shrink:0}
.ct-left{display:flex;align-items:baseline;gap:10px}
.ticker-label{font-size:13px;color:#555;font-weight:600}
.price-main{font-size:24px;font-weight:700;color:#fff}
.price-chg{font-size:12px}
.chg-up{color:#00CC44}.chg-dn{color:#FF4444}
.tf-row{display:flex;gap:3px}
.tf{font-size:11px;padding:3px 9px;border-radius:5px;color:#555;border:0.5px solid #222;cursor:pointer;transition:all .15s}
.tf.active,.tf:hover{color:#fff;border-color:#444;background:#1a1a1a}
#chart-container{flex:1;position:relative}
.sidebar{width:260px;border-right:0.5px solid #1e1e1e;background:#0d0d0d;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-section{padding:10px 12px 8px;border-bottom:0.5px solid #141414}
.sb-title{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600}
.lv-item{display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:#111;border-radius:7px;margin-bottom:3px;border-right:2px solid transparent}
.lv-cw{border-right-color:#FF4444}.lv-pw{border-right-color:#00CC44}.lv-zg{border-right-color:#555}.lv-hvl{border-right-color:#4da6ff}
.lv-label{font-size:11px;color:#666}.lv-val{font-size:13px;font-weight:600}
.vc-cw{color:#FF4444}.vc-pw{color:#00CC44}.vc-zg{color:#aaa}.vc-hvl{color:#4da6ff}
.gex-pills{display:flex;flex-wrap:wrap;gap:3px}
.gp{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.g-red{background:#1a0d0d;color:#FF4444;border:0.5px solid #3a1a1a}
.g-pur{background:#13111f;color:#9B59B6;border:0.5px solid #2a1f4a}
.g-grn{background:#0d1a0d;color:#00CC44;border:0.5px solid #1a3a1a}
.contract{background:#111;border-radius:7px;padding:7px 9px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;border-right:2px solid #FF4444}
.contract.call{border-right-color:#00CC44}
.ct-type{font-size:9px;font-weight:700;color:#FF4444}
.contract.call .ct-type{color:#00CC44}
.ct-strike{font-size:14px;font-weight:700;color:#fff}
.ct-info{font-size:9px;color:#555;text-align:left}
.stat-box{background:#111;border-radius:7px;overflow:hidden}
.stat-row{display:flex;justify-content:space-between;padding:6px 9px;border-bottom:0.5px solid #1a1a1a}
.stat-row:last-child{border-bottom:none}
.sl{font-size:10px;color:#555}.sv{font-size:10px;font-weight:600}
.overview-panel{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px}
.ov-card{background:#111;border:0.5px solid #1e1e1e;border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .15s}
.ov-card:hover{border-color:#333}.ov-card.sel{border-color:#FFA500}
.ov-top{display:flex;justify-content:space-between;margin-bottom:5px}
.ov-ticker{font-size:14px;font-weight:700}.ov-price{font-size:11px;color:#555}
.ov-lrow{display:flex;justify-content:space-between;margin:2px 0}
.ov-ll{font-size:9px;color:#444}.ov-lv{font-size:9px;font-weight:600}
.ov-bar{height:3px;background:#1a1a1a;border-radius:2px;position:relative;margin:4px 0}
.ov-spot{position:absolute;top:-3px;width:3px;height:9px;background:#4da6ff;border-radius:1px}
.ov-footer{display:flex;justify-content:space-between;margin-top:5px}
.ov-badge{font-size:9px;padding:2px 6px;border-radius:4px}
.ob-bull{background:#0d1f0d;color:#00CC44;border:0.5px solid #1a3a1a}
.ob-bear{background:#1f0d0d;color:#FF4444;border:0.5px solid #3a1a1a}
.ov-pc{font-size:9px;color:#444}
.ind-panel{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.ind-card{background:#111;border:0.5px solid #1e1e1e;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:10px}
.ind-card-header{display:flex;justify-content:space-between;align-items:center}
.ind-card-title{font-size:11px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.ind-select{background:#0d0d0d;border:0.5px solid #2a2a2a;border-radius:6px;color:#fff;font-size:11px;padding:3px 8px;cursor:pointer;outline:none}
.ind-select option{background:#0d0d0d}
.pressure-bar{height:10px;background:#1a1a1a;border-radius:5px;overflow:hidden;margin:6px 0;display:flex}
.pressure-lbl{display:flex;justify-content:space-between;font-size:10px}
.delta-bar{height:8px;background:#1a1a1a;border-radius:4px;position:relative;margin:6px 0}
.delta-fill{height:100%;border-radius:4px;position:absolute;transition:all .4s}
.delta-center{position:absolute;left:50%;top:-2px;width:1px;height:12px;background:#2a2a2a}
.pc-big{font-size:22px;font-weight:700}
.pc-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.pc-bull{background:#0d1f0d;color:#00CC44;border:0.5px solid #1a3a1a}
.pc-bear{background:#1f0d0d;color:#FF4444;border:0.5px solid #3a1a1a}
.pc-neu{background:#1a120d;color:#FFA500;border:0.5px solid #3a2a1a}
.gp-bar-wrap{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.gp-label{font-size:9px;color:#555;width:34px;text-align:right;flex-shrink:0}
.gp-track{flex:1;height:8px;background:#1a1a1a;border-radius:2px;position:relative;overflow:visible}
.gp-fill{height:100%;border-radius:2px;min-width:2px;transition:width .3s}
.gp-val{font-size:9px;width:28px;text-align:left;flex-shrink:0}
.gp-spot{position:absolute;top:-3px;width:2px;height:14px;background:#4da6ff;border-radius:1px;z-index:2}
.loading{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;flex:1;color:#333;font-size:12px}
.spinner{width:26px;height:26px;border:2px solid #1a1a1a;border-top-color:#FFA500;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.screener-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.filter-bar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;background:#0d0d0d;border-bottom:0.5px solid #1e1e1e;flex-shrink:0;align-items:center}
.f-btn{padding:4px 11px;border-radius:6px;font-size:11px;color:#555;border:0.5px solid #1a1a1a;cursor:pointer;white-space:nowrap;transition:all .15s;background:transparent}
.f-btn:hover{color:#aaa;border-color:#2a2a2a}
.f-btn.on{color:#fff;border-color:#FFA500;background:#150f00}
.f-sep{width:1px;height:18px;background:#1a1a1a;flex-shrink:0}
.scr-body{flex:1;overflow-y:auto}
.scr-table{width:100%;border-collapse:collapse}
.scr-table th{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:1px;padding:7px 10px;border-bottom:0.5px solid #1a1a1a;text-align:right;font-weight:500;position:sticky;top:0;background:#0d0d0d;cursor:pointer}
.scr-table th:hover{color:#aaa}
.scr-table td{font-size:11px;padding:8px 10px;border-bottom:0.5px solid #0f0f0f;color:#aaa;cursor:pointer}
.scr-table tr:hover td{background:#111}
.scr-ticker{font-size:13px;font-weight:700;color:#fff}
.scr-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap;display:inline-block}
.sb-bull{background:#0d1f0d;color:#00CC44;border:0.5px solid #1a3a1a}
.sb-bear{background:#1f0d0d;color:#FF4444;border:0.5px solid #3a1a1a}
.sb-neu{background:#1a120d;color:#FFA500;border:0.5px solid #3a2a1a}
.sb-blu{background:#0d1220;color:#4da6ff;border:0.5px solid #1a2a4a}
.scr-empty{color:#444;font-size:13px;text-align:center;padding:60px;width:100%}
</style>
</head>
<body>
<div class="header">
  <div class="logo">مملكة <span>التداول</span> — رصد KSA</div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="badge" id="update-badge">جاري التحميل...</div>
    <span class="dot"></span>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab" onclick="showView('overview')">الكل</div>
  <div class="nav-tab" onclick="showView('chart')">الشارت</div>
  <div class="nav-tab" onclick="showView('indicators')">المؤشرات</div>
  <div class="nav-tab" onclick="showView('screener')">الراصد</div>
</div>

<div class="ticker-toolbar">
  <button class="scroll-btn" onclick="scrollTickers(-120)">&#8250;</button>
  <div class="ticker-scroll" id="ticker-scroll"></div>
  <button class="scroll-btn" onclick="scrollTickers(120)">&#8249;</button>
</div>

<div id="view-overview" class="overview-panel">
  <div class="loading"><div class="spinner"></div>جاري سحب البيانات...</div>
</div>

<div id="view-chart" class="layout" style="display:none">
  <div class="sidebar" id="sidebar"></div>
  <div class="chart-panel">
    <div class="chart-top">
      <div class="ct-left">
        <span class="ticker-label" id="chart-name">—</span>
        <span class="price-main" id="chart-price">—</span>
        <span class="price-chg" id="chart-chg"></span>
      </div>
      <div class="tf-row">
        <span class="tf" onclick="setTF(this,'1')">1د</span>
        <span class="tf active" onclick="setTF(this,'5')">5د</span>
        <span class="tf" onclick="setTF(this,'15')">15د</span>
        <span class="tf" onclick="setTF(this,'60')">1س</span>
        <span class="tf" onclick="setTF(this,'D')">يوم</span>
      </div>
    </div>
    <div id="chart-container"></div>
  </div>
</div>

<div id="view-indicators" class="ind-panel" style="display:none">
  <div class="ind-grid" id="ind-grid">
    <div class="ind-card">
      <div class="ind-card-header">
        <span class="ind-card-title">Gamma Profile</span>
        <select class="ind-select" id="sel-gamma" onchange="renderGammaCard()"></select>
      </div>
      <div id="ind-gamma-content"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="ind-card">
      <div class="ind-card-header">
        <span class="ind-card-title">0DTE Pressure</span>
        <select class="ind-select" id="sel-pressure" onchange="renderPressureCard()"></select>
      </div>
      <div id="ind-pressure-content"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="ind-card">
      <div class="ind-card-header">
        <span class="ind-card-title">Delta Net Exposure</span>
        <select class="ind-select" id="sel-delta" onchange="renderDeltaCard()"></select>
      </div>
      <div id="ind-delta-content"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="ind-card">
      <div class="ind-card-header">
        <span class="ind-card-title">Put / Call Ratio</span>
        <select class="ind-select" id="sel-pc" onchange="renderPCCard()"></select>
      </div>
      <div id="ind-pc-content"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<div id="view-screener" style="display:none;flex:1;flex-direction:column;overflow:hidden;flex-shrink:0">
  <div class="filter-bar">
    <span style="font-size:10px;color:#444;margin-left:4px">الموضع:</span>
    <button class="f-btn" data-f="above_zero" onclick="toggleFilter(this)">▲ فوق Zero Gamma</button>
    <button class="f-btn" data-f="below_zero" onclick="toggleFilter(this)">▼ تحت Zero Gamma</button>
    <button class="f-btn" data-f="near_put" onclick="toggleFilter(this)">🟢 قريب Put Wall</button>
    <button class="f-btn" data-f="near_call" onclick="toggleFilter(this)">🔴 قريب Call Wall</button>
    <button class="f-btn" data-f="below_call" onclick="toggleFilter(this)">تحت Call Wall</button>
    <button class="f-btn" data-f="above_put" onclick="toggleFilter(this)">فوق Put Wall</button>
    <div class="f-sep"></div>
    <span style="font-size:10px;color:#444;margin-left:4px">GEX:</span>
    <button class="f-btn" data-f="gex_pos" onclick="toggleFilter(this)">+ GEX إيجابي</button>
    <button class="f-btn" data-f="gex_neg" onclick="toggleFilter(this)">- GEX سلبي</button>
    <div class="f-sep"></div>
    <span style="font-size:10px;color:#444;margin-left:4px">P/C:</span>
    <button class="f-btn" data-f="pc_high" onclick="toggleFilter(this)">P/C ≥ 1.2</button>
    <button class="f-btn" data-f="pc_low" onclick="toggleFilter(this)">P/C ≤ 0.7</button>
    <div class="f-sep"></div>
    <button class="f-btn" style="color:#666" onclick="clearFilters()">✕ مسح</button>
  </div>
  <div class="scr-body">
    <table class="scr-table">
      <thead><tr>
        <th onclick="sortScr('ticker')">الرمز ↕</th>
        <th onclick="sortScr('spot')">السعر ↕</th>
        <th>الموضع</th>
        <th onclick="sortScr('distCall')">↔ Call Wall%</th>
        <th onclick="sortScr('distPut')">↔ Put Wall%</th>
        <th onclick="sortScr('pcRatio')">P/C ↕</th>
        <th>الوضع</th>
      </tr></thead>
      <tbody id="scr-body"></tbody>
    </table>
    <div id="scr-empty" class="scr-empty" style="display:none">لا توجد نتائج — غيّر الفلاتر</div>
  </div>
</div>

<script>
const POLY_KEY = 'V7kP4H3wW_PDpOBge7jQ80G3JjUDUP0W';
const SHEET_ID = '1kS31BVYSn_xEPCtsOOeebMZuOyDS3OpQaE1Sv8ZR1wU';
const CSV_URL  = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=0');
const POLY_MAP = {SPX:'I:SPX',SPY:'SPY',QQQ:'QQQ',IWM:'IWM',GLD:'GLD',TLT:'TLT',AAPL:'AAPL',MSFT:'MSFT',NVDA:'NVDA',AMZN:'AMZN',GOOGL:'GOOGL',META:'META',TSLA:'TSLA',NFLX:'NFLX',AMD:'AMD',AVGO:'AVGO',JPM:'JPM',BAC:'BAC',GS:'GS',V:'V',MA:'MA',UNH:'UNH',LLY:'LLY',XOM:'XOM'};

let allData=[],selectedTicker=null,currentView='overview',currentTF='5',chart=null,candleSeries=null,chartLoaded=false;

function parseCSV(text){const rows=[];for(const line of text.trim().split('\n')){const cols=[];let cur='',inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}cols.push(cur.trim());rows.push(cols);}return rows;}

async function fetchSheets(){try{const res=await fetch(CSV_URL);const text=await res.text();const rows=parseCSV(text);allData=rows.slice(1).filter(r=>r[0]&&r[0]!=='Ticker'&&parseFloat(r[1])>0).map(r=>{const g=i=>parseFloat((r[i]||'0').replace(/[^0-9.\-]/g,''))||0;const s=i=>(r[i]||'—').replace(/"/g,'').trim();return{ticker:s(0),spot:g(1),callWall:g(2),putWall:g(3),zeroGamma:g(4),topGamma:g(5),dCall:g(6),dPut:g(7),theta:g(8),vega:g(9),oiCall:g(10),oiPut:g(11),pcRatio:g(12),c1:s(13),c2:s(14),c3:s(15),gl1:g(16),gl2:g(17),gl3:g(18),gl4:g(19),gl5:g(20),gl6:g(21),gl7:g(22),intradayRaw:s(23),updatedAt:s(24)};});const last=allData[allData.length-1]?.updatedAt||'—';document.getElementById('update-badge').innerHTML='آخر تحديث: <b>'+last.slice(11,16)+'</b>';buildToolbar();buildIndicatorSelects();if(currentView==='overview')renderOverview();else if(currentView==='chart'&&selectedTicker&&!chartLoaded)loadChart(selectedTicker);else if(currentView==='chart'&&selectedTicker)renderSidebar(selectedTicker);else if(currentView==='indicators')renderAllIndicators();}catch(e){document.getElementById('update-badge').textContent='خطأ في التحميل';}}

function buildToolbar(){const s=document.getElementById('ticker-scroll');s.innerHTML='';allData.forEach(d=>{const c=document.createElement('div');c.className='t-chip'+(selectedTicker===d.ticker?' active':'');c.textContent=d.ticker;c.onclick=()=>selectTicker(d.ticker);s.appendChild(c);});}

function scrollTickers(dx){document.getElementById('ticker-scroll').scrollBy({left:dx,behavior:'smooth'});}

function buildIndicatorSelects(){['sel-gamma','sel-pressure','sel-delta','sel-pc'].forEach(id=>{const sel=document.getElementById(id);if(!sel)return;const cur=sel.value;sel.innerHTML='';allData.forEach(d=>{const o=document.createElement('option');o.value=d.ticker;o.textContent=d.ticker;sel.appendChild(o);});if(cur&&allData.find(x=>x.ticker===cur))sel.value=cur;else sel.value=allData[0]?.ticker||'';});}

function renderOverview(){const panel=document.getElementById('view-overview');if(!allData.length)return;panel.innerHTML='<div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">'+allData.length+' رمز</div><div class="ov-grid" id="ov-grid"></div>';const grid=document.getElementById('ov-grid');allData.forEach(d=>{const range=d.callWall-d.putWall;const pct=range>0?Math.max(2,Math.min(97,((d.spot-d.putWall)/range)*100)):50;const bull=d.spot>=d.zeroGamma;const card=document.createElement('div');card.className='ov-card '+(selectedTicker===d.ticker?'sel':'');card.onclick=()=>selectTicker(d.ticker);card.innerHTML='<div class="ov-top"><span class="ov-ticker">'+d.ticker+'</span><span class="ov-price">'+d.spot.toLocaleString()+'</span></div><div class="ov-lrow"><span class="ov-ll">Call Wall</span><span class="ov-lv vc-cw">'+d.callWall+'</span></div><div class="ov-bar"><div class="ov-spot" style="left:'+pct.toFixed(1)+'%"></div></div><div class="ov-lrow"><span class="ov-ll">Zero Gamma</span><span class="ov-lv vc-zg">'+d.zeroGamma+'</span></div><div class="ov-lrow"><span class="ov-ll">Put Wall</span><span class="ov-lv vc-pw">'+d.putWall+'</span></div><div class="ov-footer"><span class="ov-badge '+(bull?'ob-bull':'ob-bear')+'">'+(bull?'إيجابي':'سلبي')+'</span><span class="ov-pc">P/C '+d.pcRatio+'</span></div>';grid.appendChild(card);});}

function renderSidebar(ticker){
  const d=allData.find(x=>x.ticker===ticker);if(!d)return;
  const gexs=[d.gl1,d.gl2,d.gl3,d.gl4,d.gl5,d.gl6,d.gl7].filter(g=>g>0);
  const pills=gexs.map(g=>'<span class="gp '+(g>d.callWall?'g-grn':g>=d.zeroGamma?'g-pur':'g-red')+'">'+g+'</span>').join('');
  const cHTML=str=>{if(!str||str==='—'||str==='')return'';const parts=str.split(' '),strike=parts[0]||'',type=parts[1]||'',exp=parts[2]||'';const pi=str.indexOf('|'),oi=pi>=0?str.slice(pi+1).trim():'';return'<div class="contract '+(type==='CALL'?'call':'')+'"><div><div class="ct-type">'+type+'</div><div class="ct-strike">'+strike+'</div></div><div class="ct-info">'+exp+'<br>'+oi+'</div></div>';};

  // 0DTE Pressure
  const pairs=getGammaData(d);
  let pressureHTML='<div style="color:#555;font-size:10px;text-align:center;padding:6px">لا توجد بيانات Intraday</div>';
  if(pairs.length){const callSum=pairs.filter(v=>v.gex>0).reduce((a,b)=>a+b.gex,0);const putSum=Math.abs(pairs.filter(v=>v.gex<0).reduce((a,b)=>a+b.gex,0));const total=callSum+putSum;if(total){const cp=Math.round((callSum/total)*100);const pp=100-cp;const bull=cp>pp;pressureHTML='<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px"><span style="color:#00CC44">Call '+cp+'%</span><span style="color:'+(bull?'#00CC44':'#FF4444')+';font-size:9px">'+(bull?'🟢 شراء':'🔴 بيع')+'</span><span style="color:#FF4444">Put '+pp+'%</span></div><div class="pressure-bar"><div style="width:'+cp+'%;height:100%;background:#00CC44"></div><div style="flex:1;background:#FF4444"></div></div>';}}

  // Delta Net
  const net=d.dCall+d.dPut;const maxVal=Math.max(Math.abs(d.dCall),Math.abs(d.dPut),0.01);const dpct=Math.min(48,(Math.abs(net)/maxVal)*48);const dcol=net>=0?'#00CC44':'#FF4444';const ddir=net>=0?'right':'left';
  const deltaHTML='<div class="delta-bar"><div class="delta-center"></div><div class="delta-fill" style="width:'+dpct+'%;'+ddir+':50%;background:'+dcol+'"></div></div><div style="display:flex;justify-content:space-between;font-size:10px"><span style="color:#00CC44">'+d.dCall+'M$</span><span style="color:'+dcol+';font-weight:600">Net '+(net>=0?'+':'')+net.toFixed(1)+'M$</span><span style="color:#FF4444">'+d.dPut+'M$</span></div>';

  // P/C
  const pc=d.pcRatio;const pcol=pc>=1.2?'#FF4444':pc<=0.7?'#00CC44':'#FFA500';const ptag=pc>=1.2?'تحوط مرتفع':pc<=0.7?'مضاربة مفرطة':'متوازن';const pcls=pc>=1.2?'pc-bear':pc<=0.7?'pc-bull':'pc-neu';
  const pcHTML='<div style="display:flex;justify-content:space-between;align-items:center"><span class="pc-big" style="color:'+pcol+'">'+pc+'</span><span class="pc-tag '+pcls+'">'+ptag+'</span></div><div style="height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-top:6px"><div style="height:100%;width:'+Math.min(100,pc/2*100)+'%;background:'+pcol+';border-radius:3px"></div></div>';

  // Gamma Profile (top 8)
  let gammaHTML='<div style="color:#555;font-size:10px;text-align:center;padding:4px">لا توجد بيانات</div>';
  if(pairs.length){const maxAbs=Math.max(...pairs.map(p=>Math.abs(p.gex)));const top=[...pairs].sort((a,b)=>Math.abs(b.gex)-Math.abs(a.gex)).slice(0,8).sort((a,b)=>b.strike-a.strike);gammaHTML=top.map(p=>{const pct=Math.min(100,(Math.abs(p.gex)/maxAbs)*100);const col=p.gex>=0?'#00CC44':'#FF4444';const val=(p.gex>=0?'+':'')+Math.round(p.gex/1000)+'K';const near=Math.abs(p.strike-d.spot)<(d.callWall-d.putWall)*0.03;return'<div class="gp-bar-wrap"><span class="gp-label" style="color:'+(near?'#4da6ff':'#555')+'">'+p.strike+'</span><div class="gp-track"><div class="gp-fill" style="width:'+pct.toFixed(1)+'%;background:'+col+'"></div></div><span class="gp-val" style="color:'+col+'">'+val+'</span></div>';}).join('');}

  document.getElementById('sidebar').innerHTML=
    '<div class="sb-section"><div class="sb-title">'+ticker+' — المستويات</div>'+
    '<div class="lv-item lv-cw"><span class="lv-label">مقاومة الكول</span><span class="lv-val vc-cw">'+d.callWall+'</span></div>'+
    '<div class="lv-item lv-hvl"><span class="lv-label">الأعلى سيولة</span><span class="lv-val vc-hvl">'+d.topGamma+'</span></div>'+
    '<div class="lv-item lv-zg"><span class="lv-label">نقطة التحول</span><span class="lv-val vc-zg">'+d.zeroGamma+'</span></div>'+
    '<div class="lv-item lv-pw"><span class="lv-label">دعم البوت</span><span class="lv-val vc-pw">'+d.putWall+'</span></div></div>'+
    '<div class="sb-section"><div class="sb-title">GEX Levels</div><div class="gex-pills">'+pills+'</div></div>'+
    '<div class="sb-section"><div class="sb-title">أفضل العقود</div>'+cHTML(d.c1)+cHTML(d.c2)+cHTML(d.c3)+'</div>'+
    '<div class="sb-section"><div class="sb-title">الإحصائيات</div><div class="stat-box">'+
    '<div class="stat-row"><span class="sl">OI Call</span><span class="sv" style="color:#00CC44">'+Number(d.oiCall).toLocaleString()+'</span></div>'+
    '<div class="stat-row"><span class="sl">OI Put</span><span class="sv" style="color:#FF4444">'+Number(d.oiPut).toLocaleString()+'</span></div>'+
    '<div class="stat-row"><span class="sl">P/C Ratio</span><span class="sv">'+d.pcRatio+'</span></div>'+
    '<div class="stat-row"><span class="sl">Delta Call</span><span class="sv" style="color:#00CC44">'+d.dCall+'M$</span></div>'+
    '<div class="stat-row"><span class="sl">Delta Put</span><span class="sv" style="color:#FF4444">'+d.dPut+'M$</span></div>'+
    '<div class="stat-row"><span class="sl">Vega</span><span class="sv">'+d.vega+'M$</span></div>'+
    '</div></div>'+
    '<div class="sb-section"><div class="sb-title">0DTE Pressure</div>'+pressureHTML+'</div>'+
    '<div class="sb-section"><div class="sb-title">Delta Net Exposure</div>'+deltaHTML+'</div>'+
    '<div class="sb-section"><div class="sb-title">Put / Call Ratio</div>'+pcHTML+'</div>'+
    '<div class="sb-section"><div class="sb-title">Gamma Profile</div>'+gammaHTML+'</div>';
}

function getGammaData(d){if(!d.intradayRaw||d.intradayRaw==='—'||d.intradayRaw.length<5)return[];return d.intradayRaw.split(',').map(p=>{const s=p.split(':');return{strike:parseFloat(s[0]),gex:parseFloat(s[1])};}).filter(p=>p.strike&&!isNaN(p.gex));}

function renderGammaCard(){const t=document.getElementById('sel-gamma').value;const d=allData.find(x=>x.ticker===t);const el=document.getElementById('ind-gamma-content');if(!d){el.innerHTML='<div style="color:#555;font-size:11px;text-align:center;padding:20px">لا توجد بيانات</div>';return;}const pairs=getGammaData(d);if(!pairs.length){el.innerHTML='<div style="color:#555;font-size:11px;text-align:center;padding:20px">لا توجد بيانات Intraday</div>';return;}const maxAbs=Math.max(...pairs.map(p=>Math.abs(p.gex)));const top=[...pairs].sort((a,b)=>Math.abs(b.gex)-Math.abs(a.gex)).slice(0,15).sort((a,b)=>b.strike-a.strike);let html='<div style="font-size:10px;color:#555;margin-bottom:6px">السعر الحالي: <span style="color:#4da6ff;font-weight:600">'+d.spot+'</span></div>';top.forEach(p=>{const pct=Math.min(100,(Math.abs(p.gex)/maxAbs)*100);const col=p.gex>=0?'#00CC44':'#FF4444';const val=(p.gex>=0?'+':'')+Math.round(p.gex/1000)+'K';const isNear=Math.abs(p.strike-d.spot)<(d.callWall-d.putWall)*0.03;html+='<div class="gp-bar-wrap"><span class="gp-label" style="color:'+(isNear?'#4da6ff':'#555')+'">'+p.strike+'</span><div class="gp-track"><div class="gp-fill" style="width:'+pct.toFixed(1)+'%;background:'+col+'"></div>'+(isNear?'<div class="gp-spot" style="left:'+pct.toFixed(1)+'%"></div>':'')+'</div><span class="gp-val" style="color:'+col+'">'+val+'</span></div>';});el.innerHTML=html;}

function renderPressureCard(){const t=document.getElementById('sel-pressure').value;const d=allData.find(x=>x.ticker===t);const el=document.getElementById('ind-pressure-content');if(!d){el.innerHTML='';return;}const pairs=getGammaData(d);if(!pairs.length){el.innerHTML='<div style="color:#555;font-size:11px;text-align:center;padding:10px">لا توجد بيانات Intraday</div>';return;}const callSum=pairs.filter(v=>v.gex>0).reduce((a,b)=>a+b.gex,0);const putSum=Math.abs(pairs.filter(v=>v.gex<0).reduce((a,b)=>a+b.gex,0));const total=callSum+putSum;if(!total){el.innerHTML='';return;}const cp=Math.round((callSum/total)*100);const pp=100-cp;const bull=cp>pp;el.innerHTML='<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px"><span style="color:#00CC44">Call '+cp+'%</span><span style="color:'+(bull?'#00CC44':'#FF4444')+'">'+(bull?'🟢 ضغط شراء':'🔴 ضغط بيع')+'</span><span style="color:#FF4444">Put '+pp+'%</span></div><div class="pressure-bar"><div style="width:'+cp+'%;height:100%;background:#00CC44"></div><div style="flex:1;background:#FF4444"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px"><div class="stat-box" style="padding:8px;text-align:center"><div style="font-size:9px;color:#555;margin-bottom:3px">Call GEX</div><div style="font-size:14px;font-weight:700;color:#00CC44">'+Math.round(callSum/1000000*10)/10+'M</div></div><div class="stat-box" style="padding:8px;text-align:center"><div style="font-size:9px;color:#555;margin-bottom:3px">Put GEX</div><div style="font-size:14px;font-weight:700;color:#FF4444">-'+Math.round(putSum/1000000*10)/10+'M</div></div></div>';}

function renderDeltaCard(){const t=document.getElementById('sel-delta').value;const d=allData.find(x=>x.ticker===t);const el=document.getElementById('ind-delta-content');if(!d){el.innerHTML='';return;}const net=d.dCall+d.dPut;const maxVal=Math.max(Math.abs(d.dCall),Math.abs(d.dPut),0.01);const pct=Math.min(48,(Math.abs(net)/maxVal)*48);const col=net>=0?'#00CC44':'#FF4444';const dir=net>=0?'right':'left';el.innerHTML='<div class="delta-bar"><div class="delta-center"></div><div class="delta-fill" style="width:'+pct+'%;'+dir+':50%;background:'+col+'"></div></div><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:10px"><span style="color:#00CC44">Call '+d.dCall+'M$</span><span style="color:'+col+';font-weight:600">Net '+(net>=0?'+':'')+net.toFixed(1)+'M$</span><span style="color:#FF4444">Put '+d.dPut+'M$</span></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"><div class="stat-box" style="padding:8px;text-align:center"><div style="font-size:9px;color:#555;margin-bottom:2px">Theta</div><div style="font-size:12px;font-weight:600;color:#FFA500">'+d.theta+'M$</div></div><div class="stat-box" style="padding:8px;text-align:center"><div style="font-size:9px;color:#555;margin-bottom:2px">Vega</div><div style="font-size:12px;font-weight:600;color:#9B59B6">'+d.vega+'M$</div></div><div class="stat-box" style="padding:8px;text-align:center"><div style="font-size:9px;color:#555;margin-bottom:2px">OI Total</div><div style="font-size:12px;font-weight:600">'+(Math.round((d.oiCall+d.oiPut)/1000))+'K</div></div></div>';}

function renderPCCard(){const t=document.getElementById('sel-pc').value;const d=allData.find(x=>x.ticker===t);const el=document.getElementById('ind-pc-content');if(!d){el.innerHTML='';return;}const pc=d.pcRatio;let tag,cls,hint;if(pc>=1.2){tag='تحوط مرتفع';cls='pc-bear';hint='إشارة عكسية صعودية محتملة';}else if(pc<=0.7){tag='مضاربة مفرطة';cls='pc-bull';hint='تحذير — استنزاف الشراء';}else{tag='متوازن';cls='pc-neu';hint='السوق في حالة طبيعية';}const col=pc>=1.2?'#FF4444':pc<=0.7?'#00CC44':'#FFA500';el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span class="pc-big" style="color:'+col+'">'+pc+'</span><div style="text-align:right"><div><span class="pc-tag '+cls+'">'+tag+'</span></div><div style="font-size:10px;color:#444;margin-top:4px">'+hint+'</div></div></div><div style="height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;margin-bottom:4px"><div style="height:100%;width:'+Math.min(100,pc/2*100)+'%;background:'+col+';border-radius:3px;transition:width .4s"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;color:#333"><span>0.7</span><span>1.0</span><span>1.2</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px"><div class="stat-box" style="padding:8px;text-align:center"><div style="font-size:9px;color:#555;margin-bottom:2px">OI Call</div><div style="font-size:12px;font-weight:600;color:#00CC44">'+Number(d.oiCall).toLocaleString()+'</div></div><div class="stat-box" style="padding:8px;text-align:center"><div style="font-size:9px;color:#555;margin-bottom:2px">OI Put</div><div style="font-size:12px;font-weight:600;color:#FF4444">'+Number(d.oiPut).toLocaleString()+'</div></div></div>';}

function renderAllIndicators(){renderGammaCard();renderPressureCard();renderDeltaCard();renderPCCard();}

async function fetchCandles(ticker,tf){
  const sym=POLY_MAP[ticker]||ticker;
  const now=new Date();
  const from=new Date(now);
  if(tf==='D')from.setMonth(from.getMonth()-6);
  else if(tf==='60')from.setDate(from.getDate()-30);
  else if(tf==='15')from.setDate(from.getDate()-15);
  else from.setDate(from.getDate()-7);
  const fromStr=from.toISOString().slice(0,10);
  const toDate=new Date(now);toDate.setDate(toDate.getDate()+1);
  const toStr=toDate.toISOString().slice(0,10);
  const mult=tf==='D'?1:parseInt(tf)||5;
  const span=tf==='D'?'day':'minute';
  const url='https://api.polygon.io/v2/aggs/ticker/'+encodeURIComponent(sym)+'/range/'+mult+'/'+span+'/'+fromStr+'/'+toStr+'?adjusted=true&sort=asc&limit=5000&apiKey='+POLY_KEY;
  try{
    const res=await fetch(url);
    const data=await res.json();
    console.log('[fetchCandles] '+ticker+' status='+data.status+' count='+(data.resultsCount||0)+' results='+(data.results?.length||0));
    if(data.status==='ERROR'||data.status==='NOT_AUTHORIZED'){
      document.getElementById('chart-chg').innerHTML='<span style="color:#FF4444;font-size:11px">API: '+data.message+'</span>';
      return[];
    }
    if(!data.results||data.results.length===0){
      console.warn('[fetchCandles] لا بيانات — '+JSON.stringify(data).slice(0,200));
      return[];
    }
    return data.results.map(b=>({time:b.t/1000,open:+b.o.toFixed(2),high:+b.h.toFixed(2),low:+b.l.toFixed(2),close:+b.c.toFixed(2)}));
  }catch(e){
    console.error('[fetchCandles] خطأ:',e);
    return[];
  }
}function initChart(){const container=document.getElementById('chart-container');if(chart){chart.remove();chart=null;candleSeries=null;}chart=LightweightCharts.createChart(container,{layout:{background:{color:'#0a0a0a'},textColor:'#555'},grid:{vertLines:{color:'#111'},horzLines:{color:'#111'}},crosshair:{mode:LightweightCharts.CrosshairMode.Normal},rightPriceScale:{borderColor:'#1a1a1a'},timeScale:{borderColor:'#1a1a1a',timeVisible:true,secondsVisible:false,rightOffset:10},width:container.clientWidth,height:container.clientHeight});candleSeries=chart.addCandlestickSeries({upColor:'#00CC44',downColor:'#FF4444',borderUpColor:'#00CC44',borderDownColor:'#FF4444',wickUpColor:'#00CC44',wickDownColor:'#FF4444'});window.addEventListener('resize',()=>{if(chart)chart.applyOptions({width:container.clientWidth,height:container.clientHeight});});}

function drawLevels(d){if(!candleSeries)return;const mainLines=[{price:d.callWall,color:'#FF4444',width:2,style:0,title:'CW '+d.callWall},{price:d.putWall,color:'#00CC44',width:2,style:0,title:'PW '+d.putWall},{price:d.zeroGamma,color:'#666666',width:1,style:1,title:'ZG '+d.zeroGamma},{price:d.topGamma,color:'#4da6ff',width:1,style:0,title:'HVL '+d.topGamma}];mainLines.forEach(l=>{try{candleSeries.createPriceLine({price:l.price,color:l.color,lineWidth:l.width,lineStyle:l.style,axisLabelVisible:true,title:l.title});}catch(e){}});if(d.intradayRaw&&d.intradayRaw!=='—'&&d.intradayRaw.length>5){const mainPrices=new Set([d.callWall,d.putWall,d.zeroGamma,d.topGamma]);d.intradayRaw.split(',').forEach(pair=>{const parts=pair.split(':');if(parts.length!==2)return;const strike=parseFloat(parts[0]);const gex=parseFloat(parts[1]);if(!strike||isNaN(gex))return;if(mainPrices.has(strike))return;const col=gex>0?'#00AA33':'#CC2222';const lbl=(gex>0?'+':'')+Math.round(gex/1000)+'K';try{candleSeries.createPriceLine({price:strike,color:col,lineWidth:1,lineStyle:2,axisLabelVisible:true,title:lbl});}catch(e){}});}else{const gexs=[d.gl1,d.gl2,d.gl3,d.gl4,d.gl5,d.gl6,d.gl7].filter(g=>g>0);gexs.forEach(g=>{if(Math.abs(g-d.callWall)>0.5&&Math.abs(g-d.putWall)>0.5&&Math.abs(g-d.zeroGamma)>0.5)try{candleSeries.createPriceLine({price:g,color:'#FFA500',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:String(g)});}catch(e){}});}}

async function loadChart(ticker){const d=allData.find(x=>x.ticker===ticker);if(!d)return;document.getElementById('chart-name').textContent=ticker;document.getElementById('chart-price').textContent=d.spot.toLocaleString();document.getElementById('chart-chg').textContent='';renderSidebar(ticker);initChart();try{let candles=await fetchCandles(ticker,currentTF);
// إذا ما في بيانات اليوم، ارجع لآخر 10 أيام
if(candles.length===0){const sym=POLY_MAP[ticker]||ticker;const now=new Date();const from=new Date(now);from.setDate(from.getDate()-10);const toDate=new Date(now);toDate.setDate(toDate.getDate()+1);const mult=currentTF==='D'?1:parseInt(currentTF)||5;const span=currentTF==='D'?'day':'minute';const url='https://api.polygon.io/v2/aggs/ticker/'+encodeURIComponent(sym)+'/range/'+mult+'/'+span+'/'+from.toISOString().slice(0,10)+'/'+toDate.toISOString().slice(0,10)+'?adjusted=true&sort=asc&limit=5000&apiKey='+POLY_KEY;const res=await fetch(url);const data=await res.json();candles=(data.results||[]).map(b=>({time:b.t/1000,open:+b.o.toFixed(2),high:+b.h.toFixed(2),low:+b.l.toFixed(2),close:+b.c.toFixed(2)}));}
if(candles.length===0){document.getElementById('chart-chg').innerHTML='<span style="color:#666;font-size:11px">لا توجد بيانات متاحة</span>';return;}candleSeries.setData(candles);drawLevels(d);chart.timeScale().fitContent();chartLoaded=true;const first=candles[0],last=candles[candles.length-1];const chg=last.close-first.open;const pct=((chg/first.open)*100).toFixed(2);document.getElementById('chart-chg').innerHTML='<span class="'+(chg>=0?'chg-up':'chg-dn')+'">'+(chg>=0?'+':'')+chg.toFixed(2)+' ('+pct+'%)</span>';}catch(e){document.getElementById('chart-chg').innerHTML='<span style="color:#FF4444;font-size:11px">خطأ: '+e.message+'</span>';}}

function setTF(el,tf){document.querySelectorAll('.tf').forEach(e=>e.classList.remove('active'));el.classList.add('active');currentTF=tf;chartLoaded=false;if(selectedTicker)loadChart(selectedTicker);}

function selectTicker(ticker){selectedTicker=ticker;chartLoaded=false;buildToolbar();if(currentView==='overview'){showView('chart');}else if(currentView==='chart')loadChart(ticker);else renderOverview();}

let activeFilters=new Set(),scrSort={key:'distCall',asc:true};

function toggleFilter(btn){const f=btn.dataset.f;if(activeFilters.has(f)){activeFilters.delete(f);btn.classList.remove('on');}else{activeFilters.add(f);btn.classList.add('on');}renderScr();}
function clearFilters(){activeFilters.clear();document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));renderScr();}
function sortScr(key){if(scrSort.key===key)scrSort.asc=!scrSort.asc;else{scrSort.key=key;scrSort.asc=true;}renderScr();}

function renderScr(){
  const rows=allData.map(d=>{
    const range=(d.callWall-d.putWall)||1;
    const distCall=+((d.callWall-d.spot)/d.spot*100).toFixed(2);
    const distPut=+((d.spot-d.putWall)/d.spot*100).toFixed(2);
    const pctRange=(d.spot-d.putWall)/range*100;
    const bull=d.spot>=d.zeroGamma;
    return{...d,distCall,distPut,pctRange,bull};
  });
  const filtered=rows.filter(d=>{
    if(!activeFilters.size)return true;
    for(const f of activeFilters){
      if(f==='above_zero'&&d.spot<d.zeroGamma)return false;
      if(f==='below_zero'&&d.spot>=d.zeroGamma)return false;
      if(f==='near_put'&&d.distPut>3)return false;
      if(f==='near_call'&&d.distCall>3)return false;
      if(f==='below_call'&&d.spot>=d.callWall)return false;
      if(f==='above_put'&&d.spot<=d.putWall)return false;
      if(f==='gex_pos'&&!d.bull)return false;
      if(f==='gex_neg'&&d.bull)return false;
      if(f==='pc_high'&&d.pcRatio<1.2)return false;
      if(f==='pc_low'&&d.pcRatio>0.7)return false;
    }
    return true;
  });
  filtered.sort((a,b)=>{const va=typeof a[scrSort.key]==='string'?a[scrSort.key]:+a[scrSort.key];const vb=typeof b[scrSort.key]==='string'?b[scrSort.key]:+b[scrSort.key];return scrSort.asc?(va>vb?1:-1):(va<vb?1:-1);});
  const tbody=document.getElementById('scr-body');
  const empty=document.getElementById('scr-empty');
  if(!filtered.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=filtered.map(d=>{
    const posBadge=d.pctRange>75?'<span class="scr-badge sb-bear">قريب Call Wall</span>':
                   d.pctRange<25?'<span class="scr-badge sb-bull">قريب Put Wall</span>':
                   d.spot>=d.zeroGamma?'<span class="scr-badge sb-neu">فوق Zero Gamma</span>':
                   '<span class="scr-badge sb-blu">تحت Zero Gamma</span>';
    const wBadge=d.bull?'<span class="scr-badge sb-bull">إيجابي</span>':'<span class="scr-badge sb-bear">سلبي</span>';
    const dcCol=d.distCall<2?'#FF4444':d.distCall<5?'#FFA500':'#666';
    const dpCol=d.distPut<2?'#00CC44':d.distPut<5?'#FFA500':'#666';
    return'<tr onclick="selectTicker(\''+d.ticker+'\');showView(\'chart\')">'+
      '<td><span class="scr-ticker">'+d.ticker+'</span></td>'+
      '<td style="color:#aaa">'+d.spot.toLocaleString()+'</td>'+
      '<td>'+posBadge+'</td>'+
      '<td style="color:'+dcCol+'">'+d.distCall+'%</td>'+
      '<td style="color:'+dpCol+'">'+d.distPut+'%</td>'+
      '<td style="color:'+(d.pcRatio>=1.2?'#FF4444':d.pcRatio<=0.7?'#00CC44':'#FFA500')+'">'+d.pcRatio+'</td>'+
      '<td>'+wBadge+'</td></tr>';
  }).join('');}

function showView(view){
  const views=['overview','chart','indicators','screener'];
  currentView=view;
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',views[i]===view));
  document.getElementById('view-overview').style.display=view==='overview'?'flex':'none';
  document.getElementById('view-chart').style.display=view==='chart'?'flex':'none';
  document.getElementById('view-indicators').style.display=view==='indicators'?'flex':'none';
  const sv=document.getElementById('view-screener');
  if(sv)sv.style.display=view==='screener'?'flex':'none';
  if(view==='overview')renderOverview();
  else if(view==='chart'){const t=selectedTicker||allData[0]?.ticker;if(t){selectedTicker=t;loadChart(t);}}
  else if(view==='indicators')renderAllIndicators();
  else if(view==='screener')renderScr();
}

fetchSheets();
setInterval(fetchSheets,5*60*1000);
</script>
</body>
</html>
