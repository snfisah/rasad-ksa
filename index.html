<style>
*{box-sizing:border-box;margin:0;padding:0}

<body>
<div class="header">
  <div class="logo">مملكة <span>التداول</span> — رصد KSA</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="badge" id="update-badge">جاري التحميل...</div>
    <span class="dot"></span>
  </div>
</div>
<div class="tabs" id="tabs-bar">
  <div class="tab active" onclick="showView('overview')">الكل</div>
  <div class="tab" onclick="showView('chart')">الشارت</div>
</div>

    <div class="chart-top">
      <div class="ct-left">

<script>
const POLY_KEY='V7kP4H3wW_PDpOBge7jQ80G3JjUDUP0W';
const SHEET_ID='1kS31BVYSn_xEPCtsOOeebMZuOyDS3OpQaE1Sv8ZR1wU';
const CSV_URL='https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid=0');
const POLY_MAP={SPX:'I:SPX',SPY:'SPY',QQQ:'QQQ',IWM:'IWM',GLD:'GLD',TLT:'TLT',AAPL:'AAPL',MSFT:'MSFT',NVDA:'NVDA',AMZN:'AMZN',GOOGL:'GOOGL',META:'META',TSLA:'TSLA',NFLX:'NFLX',AMD:'AMD',AVGO:'AVGO',JPM:'JPM',BAC:'BAC',GS:'GS',V:'V',MA:'MA',UNH:'UNH',LLY:'LLY',XOM:'XOM'};
let allData=[],selectedTicker=null,currentView='overview',currentTF='5',chart=null,candleSeries=null,chartLoaded=false;

function parseCSV(text){const rows=[];for(const line of text.trim().split('\n')){const cols=[];let cur='',inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}cols.push(cur.trim());rows.push(cols);}return rows;}

async function fetchSheets(){try{const res=await fetch(CSV_URL);const text=await res.text();const rows=parseCSV(text);allData=rows.slice(1).filter(r=>r[0]&&r[0]!=='Ticker'&&parseFloat(r[1])>0).map(r=>{const g=i=>parseFloat((r[i]||'0').replace(/[^0-9.\-]/g,''))||0;const s=i=>(r[i]||'—').replace(/"/g,'').trim();return{ticker:s(0),spot:g(1),callWall:g(2),putWall:g(3),zeroGamma:g(4),topGamma:g(5),dCall:g(6),dPut:g(7),theta:g(8),vega:g(9),oiCall:g(10),oiPut:g(11),pcRatio:g(12),c1:s(13),c2:s(14),c3:s(15),gl1:g(16),gl2:g(17),gl3:g(18),gl4:g(19),gl5:g(20),gl6:g(21),gl7:g(22),updatedAt:s(23)};});const last=allData[allData.length-1]?.updatedAt||'—';document.getElementById('update-badge').innerHTML='آخر تحديث: <b>'+last.slice(11,16)+'</b>';buildTabs();if(currentView==='overview')renderOverview();else if(selectedTicker&&!chartLoaded)loadChart(selectedTicker);else if(selectedTicker)renderSidebar(selectedTicker);}catch(e){document.getElementById('update-badge').textContent='خطأ في التحميل';}}

function buildTabs(){const bar=document.getElementById('tabs-bar');bar.innerHTML='<div class="tab '+(currentView==='overview'?'active':'')+'" onclick="showView(\'overview\')">الكل</div><div class="tab '+(currentView==='chart'?'active':'')+'" onclick="showView(\'chart\')">الشارت</div><div style="width:1px;background:#1a1a1a;margin:0 4px;flex-shrink:0"></div>';allData.forEach(d=>{const div=document.createElement('div');div.className='tab '+(selectedTicker===d.ticker?'active':'');div.textContent=d.ticker;div.onclick=()=>selectTicker(d.ticker);bar.appendChild(div);});}

function renderOverview(){const panel=document.getElementById('view-overview');if(!allData.length)return;panel.innerHTML='<div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">'+allData.length+' رمز</div><div class="ov-grid" id="ov-grid"></div>';const grid=document.getElementById('ov-grid');allData.forEach(d=>{const range=d.callWall-d.putWall;const pct=range>0?Math.max(2,Math.min(97,((d.spot-d.putWall)/range)*100)):50;const bull=d.spot>=d.zeroGamma;const card=document.createElement('div');card.className='ov-card '+(selectedTicker===d.ticker?'sel':'');card.onclick=()=>selectTicker(d.ticker);card.innerHTML='<div class="ov-top"><span class="ov-ticker">'+d.ticker+'</span><span class="ov-price">'+d.spot.toLocaleString()+'</span></div><div class="ov-lrow"><span class="ov-ll">Call Wall</span><span class="ov-lv vc-cw">'+d.callWall+'</span></div><div class="ov-bar"><div class="ov-spot" style="left:'+pct.toFixed(1)+'%"></div></div><div class="ov-lrow"><span class="ov-ll">Zero Gamma</span><span class="ov-lv vc-zg">'+d.zeroGamma+'</span></div><div class="ov-lrow"><span class="ov-ll">Put Wall</span><span class="ov-lv vc-pw">'+d.putWall+'</span></div><div class="ov-footer"><span class="ov-badge '+(bull?'ob-bull':'ob-bear')+'">'+(bull?'إيجابي':'سلبي')+'</span><span class="ov-pc">P/C '+d.pcRatio+'</span></div>';grid.appendChild(card);});}

function renderSidebar(ticker){const d=allData.find(x=>x.ticker===ticker);if(!d)return;const gexs=[d.gl1,d.gl2,d.gl3,d.gl4,d.gl5,d.gl6,d.gl7].filter(g=>g>0);const pills=gexs.map(g=>'<span class="gp '+(g>d.callWall?'g-grn':g>=d.zeroGamma?'g-pur':'g-red')+'">'+g+'</span>').join('');const cHTML=str=>{if(!str||str==='—'||str==='')return'';const parts=str.split(' '),strike=parts[0]||'',type=parts[1]||'',exp=parts[2]||'';const pi=str.indexOf('|'),oi=pi>=0?str.slice(pi+1).trim():'';return'<div class="contract '+(type==='CALL'?'call':'')+'"><div><div class="ct-type">'+type+'</div><div class="ct-strike">'+strike+'</div></div><div class="ct-info">'+exp+'<br>'+oi+'</div></div>';};document.getElementById('sidebar').innerHTML='<div class="sb-section"><div class="sb-title">'+ticker+' — المستويات</div><div class="lv-item lv-cw"><span class="lv-label">مقاومة الكول</span><span class="lv-val vc-cw">'+d.callWall+'</span></div><div class="lv-item lv-hvl"><span class="lv-label">الأعلى سيولة</span><span class="lv-val vc-hvl">'+d.topGamma+'</span></div><div class="lv-item lv-zg"><span class="lv-label">نقطة التحول</span><span class="lv-val vc-zg">'+d.zeroGamma+'</span></div><div class="lv-item lv-pw"><span class="lv-label">دعم البوت</span><span class="lv-val vc-pw">'+d.putWall+'</span></div></div><div class="sb-section"><div class="sb-title">GEX Levels</div><div class="gex-pills">'+pills+'</div></div><div class="sb-section"><div class="sb-title">أفضل العقود</div>'+cHTML(d.c1)+cHTML(d.c2)+cHTML(d.c3)+'</div><div class="sb-section"><div class="sb-title">الإحصائيات</div><div class="stat-box"><div class="stat-row"><span class="sl">OI Call</span><span class="sv" style="color:#00CC44">'+Number(d.oiCall).toLocaleString()+'</span></div><div class="stat-row"><span class="sl">OI Put</span><span class="sv" style="color:#FF4444">'+Number(d.oiPut).toLocaleString()+'</span></div><div class="stat-row"><span class="sl">P/C Ratio</span><span class="sv">'+d.pcRatio+'</span></div><div class="stat-row"><span class="sl">Delta Call</span><span class="sv" style="color:#00CC44">'+d.dCall+'M$</span></div><div class="stat-row"><span class="sl">Delta Put</span><span class="sv" style="color:#FF4444">'+d.dPut+'M$</span></div><div class="stat-row"><span class="sl">Vega</span><span class="sv">'+d.vega+'M$</span></div></div></div>';}

async function fetchCandles(ticker,tf){const sym=POLY_MAP[ticker]||ticker;const now=new Date();const from=new Date(now);if(tf==='D')from.setMonth(from.getMonth()-6);else if(tf==='60')from.setDate(from.getDate()-30);else if(tf==='15')from.setDate(from.getDate()-15);else from.setDate(from.getDate()-7);const fromStr=from.toISOString().slice(0,10);const toStr=now.toISOString().slice(0,10);const mult=tf==='D'?1:parseInt(tf);const span=tf==='D'?'day':'minute';const url='https://api.polygon.io/v2/aggs/ticker/'+encodeURIComponent(sym)+'/range/'+mult+'/'+span+'/'+fromStr+'/'+toStr+'?adjusted=true&sort=asc&limit=5000&apiKey='+POLY_KEY;const res=await fetch(url);const data=await res.json();if(!data.results||data.results.length===0)return[];return data.results.map(b=>({time:b.t/1000,open:+b.o.toFixed(2),high:+b.h.toFixed(2),low:+b.l.toFixed(2),close:+b.c.toFixed(2)}));}

function initChart(){const container=document.getElementById('chart-container');if(chart){chart.remove();chart=null;candleSeries=null;}chart=LightweightCharts.createChart(container,{layout:{background:{color:'#0a0a0a'},textColor:'#555'},grid:{vertLines:{color:'#111'},horzLines:{color:'#111'}},crosshair:{mode:LightweightCharts.CrosshairMode.Normal},rightPriceScale:{borderColor:'#1a1a1a'},timeScale:{borderColor:'#1a1a1a',timeVisible:true,secondsVisible:false,rightOffset:10},width:container.clientWidth,height:container.clientHeight});candleSeries=chart.addCandlestickSeries({upColor:'#00CC44',downColor:'#FF4444',borderUpColor:'#00CC44',borderDownColor:'#FF4444',wickUpColor:'#00CC44',wickDownColor:'#FF4444'});window.addEventListener('resize',()=>{if(chart)chart.applyOptions({width:container.clientWidth,height:container.clientHeight});});}

function drawLevels(d){if(!candleSeries)return;const gexs=[d.gl1,d.gl2,d.gl3,d.gl4,d.gl5,d.gl6,d.gl7].filter(g=>g>0);const lines=[{price:d.callWall,color:'#FF4444',width:2,style:0,title:'CW '+d.callWall},{price:d.putWall,color:'#00CC44',width:2,style:0,title:'PW '+d.putWall},{price:d.zeroGamma,color:'#666666',width:1,style:1,title:'ZG '+d.zeroGamma},{price:d.topGamma,color:'#4da6ff',width:1,style:0,title:'HVL '+d.topGamma}];gexs.forEach(g=>{if(Math.abs(g-d.callWall)>0.5&&Math.abs(g-d.putWall)>0.5&&Math.abs(g-d.zeroGamma)>0.5)lines.push({price:g,color:'#FFA500',width:1,style:2,title:String(g)});});lines.forEach(l=>{try{candleSeries.createPriceLine({price:l.price,color:l.color,lineWidth:l.width,lineStyle:l.style,axisLabelVisible:true,title:l.title});}catch(e){}});}

async function loadChart(ticker){const d=allData.find(x=>x.ticker===ticker);if(!d)return;document.getElementById('chart-name').textContent=ticker;document.getElementById('chart-price').textContent=d.spot.toLocaleString();document.getElementById('chart-chg').textContent='';renderSidebar(ticker);initChart();try{const candles=await fetchCandles(ticker,currentTF);if(candles.length===0){document.getElementById('chart-chg').innerHTML='<span style="color:#666;font-size:11px">لا توجد بيانات — السوق مغلق</span>';return;}candleSeries.setData(candles);drawLevels(d);chart.timeScale().fitContent();chartLoaded=true;const first=candles[0],last=candles[candles.length-1];const chg=last.close-first.open;const pct=((chg/first.open)*100).toFixed(2);document.getElementById('chart-chg').innerHTML='<span class="'+(chg>=0?'chg-up':'chg-dn')+'">'+(chg>=0?'+':'')+chg.toFixed(2)+' ('+pct+'%)</span>';}catch(e){document.getElementById('chart-chg').innerHTML='<span style="color:#FF4444;font-size:11px">خطأ: '+e.message+'</span>';}}

function setTF(el,tf){document.querySelectorAll('.tf').forEach(e=>e.classList.remove('active'));el.classList.add('active');currentTF=tf;chartLoaded=false;if(selectedTicker)loadChart(selectedTicker);}
function selectTicker(ticker){selectedTicker=ticker;chartLoaded=false;buildTabs();showView('chart');}
function showView(view){currentView=view;document.getElementById('view-overview').style.display=view==='overview'?'flex':'none';document.getElementById('view-chart').style.display=view==='chart'?'flex':'none';buildTabs();if(view==='overview')renderOverview();else{const t=selectedTicker||allData[0]?.ticker;if(t){selectedTicker=t;loadChart(t);}}}

fetchSheets();
setInterval(fetchSheets,5*60*1000);
</script>
</body>
</html>
